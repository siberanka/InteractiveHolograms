main: "com.siberanka.interactiveholograms.plugin.InteractiveHologramsPlugin"
api-version: 1.13
softdepend:
  - "PlaceholderAPI"
  - "HeadDatabase"
  - "CraftEngine"
  - "BetterModel"
  - "MythicMobs"
  - "ModelEngine"
name: "InteractiveHolograms"
description: ${description}
version: ${version}
authors: [d0by, siberanka]

#commands:
#  interactiveholograms:
#    aliases: [dh, holograms, hologram, holo]
#    usage: "/interactiveholograms <args>"
#    description: "The main command of InteractiveHolograms plugin."

permissions:
  #
  # Main permissions
  ih.admin:
    description: "Allows player to use InteractiveHolograms."
    children:
      ih.command: true
  ih.default:
    default: true
    description: "Allows player to see the version after using '/interactiveholograms'."
    children:
      ih.command.interactiveholograms: true
      ih.command.version: true
  #
  # Command permissions
  ih.command:
    description: "Allows player to use all commands of InteractiveHolograms"
    default: op
    children:
      ih.command.interactiveholograms: true
      ih.command.version: true
      ih.command.reload: true
      ih.command.list: true
      ih.command.help: true
      ih.command.convert: true
      ih.command.features: true
      ih.command.holograms: true
      ih.command.lines: true
      ih.command.pages: true
      ih.command.displays: true
  #
  # Main Command permissions
  ih.command.interactiveholograms:
    description: "Allows player to use the command '/interactiveholograms'"
  ih.command.version:
    description: "Allows player to use the command '/ih version'"
    default: op
  ih.command.reload:
    description: "Allows player to use the command '/ih reload'"
    default: op
  ih.command.list:
    description: "Allows player to use the command '/ih list [page]'"
