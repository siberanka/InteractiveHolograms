# InteractiveHolograms 3.x - global configuration
# Documentation: https://github.com/siberanka/InteractiveHolograms/blob/main/WIKI.md
#
# Boolean options accept true or false. Durations and intervals are in server
# ticks unless stated otherwise (20 ticks are normally one second).

defaults:
  # Initial content used when a legacy text line is created without text.
  text: 'Blank Line'

  # Default viewer distance in blocks. Valid range: 1..48.
  # Individual modern YAML files can use visibility_distance: -1 to inherit it.
  display-range: 48

  # Legacy renderer update range in blocks. Valid range: 1..48.
  update-range: 48

  # Default placeholder/content refresh. Valid range: 1..1200 ticks.
  update-interval: 20

  # Maximum cached parsed text/pattern results. Valid range: 5..10000.
  # Larger values can reduce repeated parsing but consume more memory.
  lru-cache-size: 500

  # Legacy line spacing in blocks. Each value accepts 0.0..2.5.
  height:
    text: 0.3
    icon: 0.6
    head: 0.75
    smallhead: 0.6

  # Legacy line origin. false stacks lines downward from the anchor; true uses
  # the compatible down-origin layout. Options: true, false.
  down-origin: false

# Minimum delay between accepted clicks from the same player.
# Valid range: 1..300 ticks.
click-cooldown: 1

# Check this repository's GitHub Releases page asynchronously on startup.
# Operators with ih.admin receive a clickable link when a newer release exists.
# Options: true, false.
check-for-updates: true

# Resolve PlaceholderAPI placeholders inside every animation frame.
# Options: true, false. Keep false unless required; true increases CPU work.
allow-placeholders-inside-animations: false

# Force a visibility recalculation after player teleports and respawns.
# Options: true, false. Enable only when a client fails to restore holograms;
# frequent tiny teleports may otherwise cause visible destroy/spawn transitions.
update-visibility-on-teleport: false

# Creation/move anchor for the legacy compatibility renderer.
# true = player eye position; false = player feet position.
holograms-eye-level-positioning: false

# Creation/move anchor for TEXT, ITEM and BLOCK display holograms.
# true = player eye position; false = player feet position.
displays-eye-level-positioning: false

# Timeout for external player skin name/UUID requests, in seconds.
# Valid range: 1..60. Increase only when console timeouts confirm it is needed.
player-skin-connection-timeout: 5

# Temporary packet damage numbers. These never create persistent world entities.
damage-display:
  # Master switch. Options: true, false.
  enabled: false
  # Target categories. Each accepts true or false.
  players: true
  mobs: true
  # Show zero or negative final damage. Options: true, false.
  zero-damage: false
  # Lifetime. Positive number of ticks; 40 = approximately two seconds.
  duration: 40
  # Text templates. {damage} is replaced by the formatted damage value.
  # Legacy color codes, animations and supported placeholders may be used.
  appearance: '&c{damage}'
  critical-appearance: '&4&lCrit! &4{damage}'
  # Vertical offset in blocks; accepts negative or positive decimals.
  height: 0.0

# Temporary packet healing numbers.
healing-display:
  # Master switch and target categories. Options: true, false.
  enabled: false
  players: true
  mobs: true
  # Lifetime in ticks.
  duration: 40
  # {heal} is replaced by the formatted health increase.
  appearance: '&a+ {heal}'
  # Vertical offset in blocks.
  height: 0.0

# Literal text replacements applied by the legacy-compatible formatter.
# Keys and values must be YAML strings. Remove entries you do not want, or add
# custom pairs. Order should not be relied upon for overlapping patterns.
custom-replacements:
  '[x]': '█'
  '[X]': '█'
  '[/]': '▌'
  '[,]': '░'
  '[,,]': '▒'
  '[,,,]': '▓'
  '[p]': '•'
  '[P]': '•'
  '[|]': '⎹'
